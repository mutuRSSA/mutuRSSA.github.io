<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir IKP - Komite Mutu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #f4f6f9; 
            padding-top: 80px; /* Jarak agar konten tidak tertutup header */
            padding-bottom: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .form-section-title { color: #5a5c69; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; margin-top: 30px; }
        .card-custom { box-shadow: 0 0 1px rgba(0,0,0,.125), 0 1px 3px rgba(0,0,0,.2); border-radius: 4px; border-top: 3px solid #3c8dbc; }
        .btn-simpan { background-color: #3c8dbc; border-color: #367fa9; color: white; width: 120px; }
        .btn-simpan:hover { background-color: #367fa9; color: white; }
        
        /* Tema Header dan Sidebar */
        .bg-custom-dark { background-color: #3c8dbc; } /* Mengikuti warna biru tema dashboard */
        .sidebar-link.active { background-color: #f4f6f9; color: #3c8dbc; border-left: 4px solid #3c8dbc; font-weight: bold; }
        .sidebar-link { color: #333; font-weight: 500; transition: 0.2s; }
        .sidebar-link:hover { background-color: #e9ecef; }
        .navbar-brand { font-size: 1.25rem; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="container">
        <div class="bg-white p-4 card-custom">
            <h4 class="mb-4 text-secondary d-flex align-items-center">
                <span class="fs-3 me-2 text-dark">IKP</span> 
                <small class="text-muted fs-6 mt-1">FORMULIR LAPORAN INSIDEN KE TIM KESELAMATAN PASIEN DI FASILITAS PELAYANAN KESEHATAN</small>
            </h4>
            
            <form id="ikpForm">
                <h5 class="form-section-title">A. DATA PASIEN</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">1. Umur</label>
                        <div class="d-flex align-items-center gap-2">
                            <input type="number" class="form-control" name="umur_hari" style="width: 80px;"> <span class="fw-bold">Hari</span>
                            <input type="number" class="form-control" name="umur_bulan" style="width: 80px;"> <span class="fw-bold">Bulan</span>
                            <input type="number" class="form-control" name="umur_tahun" style="width: 80px;"> <span class="fw-bold">Tahun</span>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">3. Jenis Kelamin</label>
                        <select class="form-select" name="jenis_kelamin">
                            <option value="Perempuan">Perempuan</option>
                            <option value="Laki-laki">Laki-laki</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">2. Penanggung Biaya Pasien</label>
                        <select class="form-select" name="penanggung_biaya">
                            <option value=""></option>
                            <option value="BPJS">BPJS</option>
                            <option value="Umum/Pribadi">Umum/Pribadi</option>
                            <option value="Asuransi Lain">Asuransi Lain</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">4. Tanggal Mendapatkan Pelayanan</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="fa-regular fa-calendar"></i></span>
                            <input type="datetime-local" class="form-control" name="tanggal_pelayanan">
                        </div>
                    </div>
                </div>

                <h5 class="form-section-title">B. RINCIAN KEJADIAN</h5>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">1. Tanggal dan Waktu Insiden</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fa-regular fa-calendar"></i></span>
                                <input type="datetime-local" class="form-control" name="tgl_waktu_insiden">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">2. Insiden</label>
                            <input type="text" class="form-control" name="insiden">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">3. Kronologis Insiden</label>
                            <small class="d-block fw-bold text-dark mb-2">(Di Dalam Kronologis Nama pasien,Nama fasyankes,Nama Dokter,Nama Perawat,Nama Petugas Semua Harus Berupa Inisial)</small>
                            <textarea class="form-control" name="kronologis" rows="4"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">4. Jenis Insiden</label>
                            <select class="form-select" name="jenis_insiden">
                                <option value=""></option>
                                <option value="KNC">KNC</option>
                                <option value="KTC">KTC</option>
                                <option value="KTD">KTD</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">5. Insiden Terjadi Pada Pasien</label>
                            <select class="form-select" name="terjadi_pada">
                                <option value=""></option>
                                <option value="Penyakit Dalam">Penyakit Dalam</option>
                                <option value="Bedah">Bedah</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">6. Dampak Insiden Terhadap Pasien</label>
                            <select class="form-select" name="dampak">
                                <option value=""></option>
                                <option value="Tidak Signifikan">1 - Tidak Signifikan (Tidak ada cedera)</option>
                                <option value="Minor">2 - Minor (Cedera ringan, mis. luka lecet, dpt diatasi dgn pertolongan pertama)</option>
                                <option value="Moderat">3 - Moderat (Cedera sedang, fungsi berkurang reversibel, perpanjang perawatan)</option>
                                <option value="Mayor">4 - Mayor (Cedera luas/berat, cacat/lumpuh, fungsi hilang irreversibel)</option>
                                <option value="Katastropik">5 - Katastropik (Kematian yg tidak berhubungan dgn perjalanan penyakit)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">7. Probabilitas</label>
                            <select class="form-select" name="probabilitas">
                                <option value=""></option>
                                <option value="Sangat Jarang">1 - Sangat Jarang (> 5 tahun / 1x)</option>
                                <option value="Jarang">2 - Jarang (> 2 - 5 tahun / 1x)</option>
                                <option value="Mungkin">3 - Mungkin (1 - 2 tahun / 1x)</option>
                                <option value="Sering">4 - Sering (Beberapa kali / tahun)</option>
                                <option value="Sangat Sering">5 - Sangat Sering (Tiap minggu / bulan)</option>
                            </select>
                        </div>
                        
                        <div class="mb-3 p-3 rounded" id="boxGrading" style="background-color: #f8f9fa; border: 1px solid #dee2e6;">
                            <label class="form-label fw-bold text-secondary mb-1">Hasil Grading Risiko:</label>
                            <div id="hasilGrading" class="fs-5 fw-bold text-center py-2 rounded">-</div>
                            <input type="hidden" name="grading_risiko" id="inputGrading">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">8. Orang Pertama Yang Melaporkan Insiden</label>
                            <select class="form-select" name="pelapor_pertama">
                                <option value=""></option>
                                <option value="Dokter">Dokter</option>
                                <option value="Perawat">Perawat</option>
                                <option value="Pasien">Pasien</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">9. Insiden menyangkut pasien</label>
                            <select class="form-select" name="menyangkut_pasien">
                                <option value=""></option>
                                <option value="Rawat Inap">Rawat Inap</option>
                                <option value="Rawat Jalan">Rawat Jalan</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">10. Tempat Insiden</label>
                            <select class="form-select" name="tempat_insiden">
                                <option value=""></option>
                                <option value="Ruang Perawatan">Ruang Perawatan</option>
                                <option value="IGD">IGD</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">11. Unit/Departement terkait penyebab insiden</label>
                            <select class="form-select" name="unit_terkait">
                                <option value=""></option>
                                <option value="Farmasi">Farmasi</option>
                                <option value="Laboratorium">Laboratorium</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">12. Tindak lanjut yang dilakukan segera setelah kejadian, dan hasilnya</label>
                            <textarea class="form-control" name="tindak_lanjut" rows="4"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">13. Tindak Lanjut Dilakukan Oleh</label>
                            <select class="form-select" name="dilakukan_oleh">
                                <option value=""></option>
                                <option value="Tim Medis">Tim Medis</option>
                                <option value="Manajemen">Manajemen</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">14. Apakah kejadian insiden yang sama pernah terjadi pada Pelayanan lain ?</label>
                            <div class="mt-2">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="pernah_terjadi" id="radioYa" value="Ya">
                                    <label class="form-check-label" for="radioYa">Ya</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="pernah_terjadi" id="radioTidak" value="Tidak" checked>
                                    <label class="form-check-label" for="radioTidak">Tidak</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button type="submit" class="btn btn-simpan fw-bold" id="submitBtn">SIMPAN</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const dampakEl = document.querySelector('[name="dampak"]');
            const probEl = document.querySelector('[name="probabilitas"]');
            const hasilDiv = document.getElementById('hasilGrading');
            const boxDiv = document.getElementById('boxGrading');
            const inputGrading = document.getElementById('inputGrading');

            function hitungGrading() {
                // 1. Buat kamus (mapping) nilai teks menjadi angka
                const nilaiDampak = {
                    "Tidak Signifikan": 1,
                    "Minor": 2,
                    "Moderat": 3,
                    "Mayor": 4,
                    "Katastropik": 5
                };
                
                const nilaiProbabilitas = {
                    "Sangat Jarang": 1,
                    "Jarang": 2,
                    "Mungkin": 3,
                    "Sering": 4,
                    "Sangat Sering": 5
                };

                // 2. Ambil angka berdasarkan pilihan user saat ini
                const d_val = nilaiDampak[dampakEl.value];
                const p_val = nilaiProbabilitas[probEl.value];

                // 3. Jika keduanya sudah dipilih, hitung matriksnya
                if (d_val && p_val) {
                    // Matriks berdasarkan gambar: Baris=Probabilitas(1-5), Kolom=Dampak(1-5)
                    const matrix = {
                        5: ["Moderate", "Moderate", "High", "Extreme", "Extreme"],
                        4: ["Moderate", "Moderate", "High", "Extreme", "Extreme"],
                        3: ["Low", "Moderate", "High", "Extreme", "Extreme"],
                        2: ["Low", "Low", "Moderate", "High", "Extreme"],
                        1: ["Low", "Low", "Moderate", "High", "Extreme"]
                    };

                    // Ambil hasil dari matriks (d_val - 1 karena index array dimulai dari 0)
                    const hasil = matrix[p_val][d_val - 1]; 
                    
                    // Simpan hasil ke input tersembunyi untuk dikirim ke Google Sheets
                    inputGrading.value = hasil;

                    // Mengatur Teks dan Warna sesuai Matriks
                    hasilDiv.classList.remove('text-dark', 'text-white');
                    if (hasil === 'Low') {
                        hasilDiv.innerText = "LOW (Rendah)";
                        hasilDiv.style.backgroundColor = "#0d6efd"; // Biru
                        hasilDiv.classList.add('text-white');
                    } else if (hasil === 'Moderate') {
                        hasilDiv.innerText = "MODERATE (Sedang)";
                        hasilDiv.style.backgroundColor = "#198754"; // Hijau
                        hasilDiv.classList.add('text-white');
                    } else if (hasil === 'High') {
                        hasilDiv.innerText = "HIGH (Tinggi)";
                        hasilDiv.style.backgroundColor = "#ffc107"; // Kuning
                        hasilDiv.classList.add('text-dark');
                    } else if (hasil === 'Extreme') {
                        hasilDiv.innerText = "EXTREME (Sangat Tinggi)";
                        hasilDiv.style.backgroundColor = "#dc3545"; // Merah
                        hasilDiv.classList.add('text-white');
                    }
                } else {
                    // Jika salah satu belum dipilih, kembalikan ke kondisi kosong
                    hasilDiv.innerText = "-";
                    hasilDiv.style.backgroundColor = "transparent";
                    hasilDiv.classList.remove('text-white', 'text-dark');
                    inputGrading.value = "";
                }
            }

            // Jalankan fungsi hitungGrading setiap kali pilihan dropdown diubah
            if(dampakEl && probEl) {
                dampakEl.addEventListener('change', hitungGrading);
                probEl.addEventListener('change', hitungGrading);
            }
            
            // Panggil sekali saat halaman dimuat (berguna saat mode Edit data)
            setTimeout(hitungGrading, 500); 
        });
    </script>
    <script src="components.js"></script>
</body>
</html>
