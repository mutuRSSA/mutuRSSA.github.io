<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar KPC - Komite Mutu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f4f6f9; padding-top: 80px; padding-bottom: 40px; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card-custom { box-shadow: 0 0 1px rgba(0,0,0,.125), 0 1px 3px rgba(0,0,0,.2); border-radius: 4px; border-top: 3px solid #ffc107; }
        .bg-custom-dark { background-color: #3c8dbc; } 
        .sidebar-link.active { background-color: #f4f6f9; color: #3c8dbc; border-left: 4px solid #3c8dbc; font-weight: bold; }
        .sidebar-link { color: #333; font-weight: 500; transition: 0.2s; }
        
        /* CSS KHUSUS PRINT */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; font-family: Arial, sans-serif; }
            .print-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
            .print-table th, .print-table td { border: 1px solid #000; padding: 8px; vertical-align: top; }
            .print-table th { background-color: #f0f0f0 !important; -webkit-print-color-adjust: exact; text-align: left; }
            .text-center { text-align: center; }
            @page { margin: 1cm; }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="container-fluid px-4">
        <div class="bg-white p-4 card-custom">
            <h5 class="mb-4 text-secondary text-uppercase border-bottom pb-2">Riwayat Kondisi Potensial Cedera (KPC)</h5>
            <div id="loadingMessage" class="alert alert-info text-center">Mengambil data KPC dari server...</div>

            <div class="table-responsive">
                <table id="kpcTable" class="table table-bordered table-striped" style="width:100%; display: none; font-size: 0.85rem;">
                    <thead>
                        <tr class="bg-light text-center">
                            <th>No</th>
                            <th>Aksi</th>
                            <th>Tanggal Penemuan</th>
                            <th>Lokasi</th>
                            <th>Deskripsi KPC</th>
                            <th>Tindakan Awal</th>
                            <th>Pelapor</th>
                            <th>Bukti Foto</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="printArea" style="display: none;"></div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        window.kpcData = [];

        $(document).ready(function() {
            // MASUKKAN URL WEB APP KPC ANDA DI SINI
            const scriptURL = "https://script.google.com/macros/s/AKfycbyEYtIZY66GfN3s8wY7dPovPN0jU40KcvBC3ecrRRp3L981wy503UvJx7YpOAg4oCkl/exec";

            fetch(scriptURL, { redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" }})
            .then(res => res.text())
            .then(text => {
                const result = JSON.parse(text);
                $('#loadingMessage').hide(); 
                $('#kpcTable').show();
                
                if(result.status === 'success') {
                    window.kpcData = result.data;
                    let html = '';
                    
                    result.data.forEach((row, index) => {
                        let tglWaktu = row['Tgl & Waktu Penemuan'] ? new Date(row['Tgl & Waktu Penemuan']).toLocaleString('id-ID') : '-';
                        
                        // Cek apakah ada foto
                        let fotoLink = row['Link Bukti Foto'] && row['Link Bukti Foto'] !== "" ? 
                            `<a href="${row['Link Bukti Foto']}" target="_blank" class="btn btn-outline-primary btn-sm"><i class="fas fa-image"></i> Lihat Foto</a>` : 
                            `<span class="text-muted fst-italic">Tidak ada foto</span>`;

                        // LOGIKA PENYEMBUNYIAN TOMBOL: Cek jika "Penyebab Langsung" sudah diisi
                        let sudahDianalisis = row['Penyebab Langsung'] && row['Penyebab Langsung'].toString().trim() !== '';
                        
                        let tombolAksi = '';
                        if (sudahDianalisis) {
                            tombolAksi = `
                                <button onclick="printKPC(${index})" class="btn btn-info btn-sm text-white mb-1" title="Cetak PDF"><i class="fas fa-print"></i></button><br>
                                <span class="badge bg-success mt-1"><i class="fas fa-check"></i> Investigasi Selesai</span>
                            `;
                        } else {
                            tombolAksi = `
                                <button onclick="printKPC(${index})" class="btn btn-info btn-sm text-white mb-1" title="Cetak PDF"><i class="fas fa-print"></i></button>
                                <button onclick="analisisKPC(${index})" class="btn btn-success btn-sm text-white mb-1" title="Investigasi Sederhana"><i class="fas fa-search"></i></button>
                                <button onclick="editKPC(${index})" class="btn btn-warning btn-sm text-white mb-1" title="Edit"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteKPC(${index})" class="btn btn-danger btn-sm text-white mb-1" title="Hapus"><i class="fas fa-trash"></i></button>
                            `;
                        }

                        html += `
                            <tr>
                                <td class="text-center">${index + 1}</td>
                                <td class="text-center" style="min-width: 120px;">${tombolAksi}</td>
                                <td>${tglWaktu}</td>
                                <td>${row['Lokasi / Unit'] || '-'}</td>
                                <td>${row['Deskripsi KPC'] || '-'}</td>
                                <td>${row['Tindakan yang Dilakukan'] || '-'}</td>
                                <td>${row['Nama Pelapor'] || '-'}<br><small class="text-muted">${row['Unit Pelapor'] || '-'}</small></td>
                                <td class="text-center">${fotoLink}</td>
                            </tr>
                        `;
                    });
                    
                    $('#tableBody').html(html);
                    $('#kpcTable').DataTable({ "ordering": true, "order": [[0, 'desc']], "columnDefs": [{ "targets": [1, 7], "orderable": false }] });
                }
            })
            .catch(err => alert("Gagal memuat data: " + err));

            // FUNGSI AKSI
            window.deleteKPC = function(index) {
                if(!confirm("Yakin ingin menghapus laporan KPC ini?")) return;
                fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: window.kpcData[index].Timestamp })})
                .then(res => res.json()).then(res => { alert("Dihapus!"); location.reload(); });
            };

            window.editKPC = function(index) {
                localStorage.setItem('editDataKPC', JSON.stringify(window.kpcData[index]));
                window.location.href = 'kpc.html';
            };

            window.analisisKPC = function(index) {
                localStorage.setItem('analisisDataKPC', JSON.stringify(window.kpcData[index]));
                window.location.href = 'analisis_kpc.html';
            };

            window.printKPC = function(index) {
                const d = window.kpcData[index];
                let tgl = d['Tgl & Waktu Penemuan'] ? new Date(d['Tgl & Waktu Penemuan']).toLocaleString('id-ID') : '-';
                
                // Menyusun Template Cetak
                let printHtml = `
                    <h3 style="text-align: center; margin-bottom: 20px;">LEMBAR KERJA INVESTIGASI SEDERHANA<br><small>Laporan Kondisi Potensial Cedera (KPC)</small></h3>
                    <table class="print-table">
                        <tr><th colspan="2">A. INFORMASI KPC</th></tr>
                        <tr><td width="30%"><strong>Tanggal Penemuan</strong></td><td>${tgl}</td></tr>
                        <tr><td><strong>Lokasi / Unit</strong></td><td>${d['Lokasi / Unit'] || '-'}</td></tr>
                        <tr><td><strong>Deskripsi Kondisi</strong></td><td>${d['Deskripsi KPC'] || '-'}</td></tr>
                        <tr><td><strong>Tindakan Awal</strong></td><td>${d['Tindakan yang Dilakukan'] || '-'}</td></tr>
                        <tr><td><strong>Pelapor</strong></td><td>${d['Nama Pelapor'] || '-'} (${d['Unit Pelapor'] || '-'})</td></tr>
                    </table>
                    
                    <table class="print-table">
                        <tr><th>B. INVESTIGASI & ANALISIS SEDERHANA</th></tr>
                        <tr><td><strong>Penyebab Langsung Insiden:</strong><br><br>${d['Penyebab Langsung'] || '<em>Belum dianalisis</em>'}<br><br></td></tr>
                        <tr><td><strong>Penyebab Yang Melatar Belakangi / Akar Masalah:</strong><br><br>${d['Akar Masalah'] || '<em>Belum dianalisis</em>'}<br><br></td></tr>
                    </table>

                    <table class="print-table">
                        <tr class="text-center"><th>Rekomendasi</th><th>Penanggung Jawab</th><th>Tanggal</th></tr>
                        <tr>
                            <td>${d['Rekomendasi'] || '-'}</td>
                            <td class="text-center">${d['PJ Rekomendasi'] || '-'}</td>
                            <td class="text-center">${d['Tgl Rekomendasi'] || '-'}</td>
                        </tr>
                    </table>

                    <table class="print-table">
                        <tr class="text-center"><th>Tindakan Yang Akan Dilakukan</th><th>Penanggung Jawab</th><th>Tanggal</th></tr>
                        <tr>
                            <td>${d['Tindakan Akan Dilakukan'] || '-'}</td>
                            <td class="text-center">${d['PJ Tindakan'] || '-'}</td>
                            <td class="text-center">${d['Tgl Tindakan'] || '-'}</td>
                        </tr>
                    </table>
                `;
                
                const pArea = document.getElementById('printArea');
                pArea.innerHTML = printHtml;
                pArea.style.display = 'block';
                window.print();
                setTimeout(() => { pArea.style.display = 'none'; }, 1000);
            };
        });
    </script>
    <script src="components.js"></script>
</body>
</html>
